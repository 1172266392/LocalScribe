<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>LocalScribe</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Sound waves left of microphone -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M 96 196 Q 56 256 96 316" stroke-width="16" opacity="0.32"/>
    <path d="M 144 216 Q 116 256 144 296" stroke-width="16" opacity="0.58"/>
    <path d="M 188 234 Q 174 256 188 278" stroke-width="14" opacity="0.88"/>
  </g>

  <!-- Microphone -->
  <g>
    <!-- Yoke (U around lower body) -->
    <path d="M 244 244 v 30 a 76 76 0 0 0 152 0 v -30"
          fill="none" stroke="#e2e8f0" stroke-width="22" stroke-linecap="round"/>
    <!-- Stem -->
    <line x1="320" y1="356" x2="320" y2="416"
          stroke="#e2e8f0" stroke-width="22" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="270" y1="418" x2="370" y2="418"
          stroke="#e2e8f0" stroke-width="22" stroke-linecap="round"/>
    <!-- Body (capsule) -->
    <rect x="278" y="116" width="84" height="180" rx="42" fill="url(#mic)"/>
    <!-- Body inner gridlines for capsule detail -->
    <g stroke="#94a3b8" stroke-linecap="round" opacity="0.45">
      <line x1="296" y1="156" x2="344" y2="156" stroke-width="3"/>
      <line x1="296" y1="184" x2="344" y2="184" stroke-width="3"/>
      <line x1="296" y1="212" x2="344" y2="212" stroke-width="3"/>
      <line x1="296" y1="240" x2="344" y2="240" stroke-width="3"/>
    </g>
  </g>

  <!-- Lock badge (bottom-right) — signals offline / privacy -->
  <g transform="translate(404, 404)">
    <circle r="58" fill="#0f172a"/>
    <circle r="58" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.18"/>
    <!-- Shackle -->
    <path d="M -15 -8 v -11 a 15 15 0 0 1 30 0 v 11"
          fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-20" y="-8" width="40" height="30" rx="5" fill="#ffffff"/>
    <!-- Keyhole -->
    <circle cx="0" cy="6" r="3" fill="#0f172a"/>
    <line x1="0" y1="7" x2="0" y2="14" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
